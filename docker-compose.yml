services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-goey_smar}
      POSTGRES_USER: ${POSTGRES_USER:-goey_smar}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-replace-me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-goey_smar}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"

  web:
    build: .
    env_file: .env
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    command: sh -c "python manage.py migrate && python manage.py collectstatic --noinput && gunicorn config.wsgi:application --bind 0.0.0.0:8000"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  worker_scraper_amazon_a:
    build: .
    env_file: .env
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      AMAZON_PROFILE_DIR: /app/amazon-profile
      AMAZON_PROFILE_DIR_AMAZON_A: /app/amazon-profile
      AMAZON_SCRAPER_ACCOUNT: amazon_a
      GOEY_CELERY_WORKER_PROCESS: "1"
    command: celery -A config worker -l INFO --concurrency=1 --prefetch-multiplier=1 -Q scraper_amazon_a -n scraper_amazon_a@%h
    volumes:
      - amazon_profile:/app/amazon-profile
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  worker_scraper_amazon_b:
    build: .
    env_file: .env
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      AMAZON_PROFILE_DIR_AMAZON_B: /app/amazon-profile
      AMAZON_SCRAPER_ACCOUNT: amazon_b
      GOEY_CELERY_WORKER_PROCESS: "1"
    command: celery -A config worker -l INFO --concurrency=1 --prefetch-multiplier=1 -Q scraper_amazon_b -n scraper_amazon_b@%h
    volumes:
      - amazon_profile_b:/app/amazon-profile
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  worker_creators:
    build: .
    env_file: .env
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    command: celery -A config worker -l INFO --concurrency=1 --prefetch-multiplier=1 -Q creators_api -n creators_api@%h
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  beat:
    build: .
    env_file: .env
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    command: celery -A config beat -l INFO
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

volumes:
  postgres_data:
  redis_data:
  amazon_profile:
  amazon_profile_b:
